<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentFlowKit Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AgentFlowKit Console</p>
          <h1>Design, run, and observe multi-agent workflows</h1>
        </div>
        <div class="status-strip">
          <span id="healthDot" class="dot"></span>
          <span id="healthText">Checking</span>
        </div>
      </header>

      <main class="workspace">
        <section class="panel designer">
          <div class="panel-head">
            <h2>Workflow Designer</h2>
            <span id="providerBadge" class="badge">Provider</span>
          </div>

          <label>
            Objective
            <textarea id="objective" rows="5">Generate a concise middleware experiment report.</textarea>
          </label>

          <label>
            Topic
            <input id="topic" value="LangGraph multi-agent middleware" />
          </label>

          <label>
            Requirements
            <input id="requirements" value="Planner-ReAct, skill/tool registry, model routing, tracing" />
          </label>

          <div class="segmented" role="group" aria-label="Planner mode">
            <button id="templateMode" class="active" type="button">Template</button>
            <button id="grokMode" type="button">Grok planner</button>
          </div>

          <div class="actions">
            <button id="previewBtn" class="secondary" type="button">Generate Plan</button>
            <button id="runBtn" class="primary" type="button">Run Workflow</button>
          </div>
          <button id="smokeBtn" class="ghost" type="button">Grok Smoke Test</button>
        </section>

        <section class="panel graph-panel">
          <div class="panel-head">
            <h2>Workflow Graph</h2>
            <span id="plannerBadge" class="badge">template</span>
          </div>
          <div id="graph" class="graph"></div>
        </section>

        <section class="panel trace-panel">
          <div class="panel-head">
            <h2>Trace Inspector</h2>
            <span id="eventCount" class="badge">0 events</span>
          </div>
          <div id="trace" class="trace-empty">Run a workflow to inspect trace events.</div>
        </section>
      </main>

      <section class="panel output-panel">
        <div class="panel-head">
          <h2>Run Output</h2>
          <span id="outputBadge" class="badge">ready</span>
        </div>
        <pre id="output">{}</pre>
      </section>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
